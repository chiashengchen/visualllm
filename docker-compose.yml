# VisualLLM — speech pipeline (no avatar)
#
# Services:
#   cosyvoice  — CosyVoice2 TTS streaming server (GPU, port 8001)
#   pipeline   — Pipecat speech pipeline (CPU, port 7860)
#
# Usage:
#   docker compose up               # start everything
#   docker compose up cosyvoice     # start TTS only
#   docker compose stop             # stop (keep volumes)
#   docker compose down -v          # stop + delete weights volume
#
# First run downloads ~3GB CosyVoice weights into the cosyvoice-weights volume.
# Set DEEPGRAM_API_KEY and OPENROUTER_API_KEY in a .env file or environment.

services:

  # ── CosyVoice TTS server ───────────────────────────────────────────────────
  cosyvoice:
    build:
      context: ../CosyVoice
      dockerfile: Dockerfile.tts
    image: visualllm/cosyvoice-tts:latest
    container_name: cosyvoice
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - cosyvoice-weights:/app/pretrained_models
    environment:
      COSYVOICE_MODEL_DIR: /app/pretrained_models/CosyVoice2-0.5B
      HF_MODEL_ID: FunAudioLLM/CosyVoice2-0.5B
      USE_VLLM: "0"    # vllm server is a separate process; use standard PyTorch inference
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s    # weight download can take a while on first run

  # ── MuseTalk avatar server (GPU, port 8002) ───────────────────────────────
  musetalk:
    build:
      context: .
      dockerfile: Dockerfile.musetalk
    image: visualllm/musetalk:latest
    container_name: musetalk
    restart: unless-stopped
    ports:
      - "8002:8002"    # pipeline runs on host network → reaches localhost:8002
    volumes:
      - musetalk-weights:/app/local_services/musetalk_server/vendor/MuseTalk/models
      - musetalk-cache:/app/local_services/musetalk_server/avatar_cache
      - ./assets:/app/assets:ro    # portrait (AVATAR_REF) lives here, not in the image
    environment:
      MUSETALK_SIZE: "512"
      MUSETALK_FPS: "10"     # conservative for the shared T4; raise if render keeps up
      AVATAR_REF: assets/avatar.jpg
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── HTTPS reverse proxy (nginx + self-signed cert, port 443) ─────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    # Reach the pipeline which runs on host network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - pipeline

  # ── Pipecat speech pipeline ────────────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: visualllm/pipeline:latest
    container_name: pipeline
    restart: unless-stopped
    # host networking: WebRTC UDP sockets bind directly on the host IP,
    # bypassing Docker NAT so browser ICE candidates can reach the server.
    network_mode: host
    environment:
      ENABLE_AVATAR: "1"
      AVATAR_URL: http://localhost:8002    # musetalk publishes 8002 on the host
      MUSETALK_FPS: "10"    # MUST match the musetalk service fps (one fps everywhere)
      MUSETALK_SIZE: "512"
      AVATAR_MEMORY: "0"
      TTS_PROVIDER: cosyvoice
      COSYVOICE_URL: http://localhost:8001    # cosyvoice port 8001 is mapped to host
      LLM_PROVIDER: openrouter
      LANGUAGE: zh
      WEBRTC_ICE_SUBNET: "0"
      BOT_VAD_STOP_FALLBACK_SECS: "600"
      # API keys — set in .env file or pass via environment
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash-lite}
    depends_on:
      - cosyvoice

volumes:
  cosyvoice-weights:    # persists model weights across restarts
  musetalk-weights:     # MuseTalk UNet/VAE/whisper/face-parse weights (~5GB)
  musetalk-cache:       # one-time avatar preparation cache per portrait
