name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Import validation (runs on every push + PR) ──────────────────────────
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports (preflight)
        env:
          # Provide dummy keys so config.py doesn't error on missing vars
          DEEPGRAM_API_KEY: dummy
          OPENROUTER_API_KEY: dummy
          ENABLE_AVATAR: "0"
        run: python -m scripts.preflight
