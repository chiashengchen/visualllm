name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: visualllm-prod
  REGION: asia-east1
  REPO: visualllm
  SERVICE: visualllm-pipeline
  IMAGE: asia-east1-docker.pkg.dev/visualllm-prod/visualllm/pipeline

jobs:
  # ── 1. Import validation (runs on every push + PR) ──────────────────────────
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports (preflight)
        env:
          # Provide dummy keys so config.py doesn't error on missing vars
          DEEPGRAM_API_KEY: dummy
          OPENROUTER_API_KEY: dummy
          ENABLE_AVATAR: "0"
        run: python -m scripts.preflight

  # ── 2. Build Docker image + deploy to Cloud Run (main branch only) ──────────
  build-deploy:
    name: Build & Deploy to Cloud Run
    needs: preflight
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation (no long-lived key)
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --cache-from ${{ env.IMAGE }}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      - name: Push to Artifact Registry
        run: docker push ${{ env.IMAGE }} --all-tags

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --port 7860 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600 \
            --concurrency 10 \
            --max-instances 3 \
            --set-env-vars "ENABLE_AVATAR=0,AVATAR_MEMORY=0,TTS_PROVIDER=deepgram,LLM_PROVIDER=openrouter,WEBRTC_ICE_SUBNET=0" \
            --set-secrets "DEEPGRAM_API_KEY=deepgram-key:latest,OPENROUTER_API_KEY=openrouter-key:latest" \
            --allow-unauthenticated \
            --quiet

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} --format "value(status.url)")
          echo "::notice title=Deployed::${URL}/client/"
