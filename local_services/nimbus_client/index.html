<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nimbus AI — UI Mockup</title>
<!--
  Nimbus AI Weather Presenter — Phase-1 static mockup (figma-to-code).
  Pixel-faithful, responsive, self-contained reproduction of the Figma "Group 2".
  Avatar stage is a PLACEHOLDER; Phase 2 wires it to the live pipecat WebRTC avatar
  video + mic + bot audio + RTVI transcript. Colors/spacing/icons taken from the export.
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hanken+Grotesk:wght@600;700;800&family=Geist:wght@500;600;700&display=swap');

  :root {
    --bg-0:        #070b16;
    --bg-appbar:   #0D1322;
    --glass:       rgba(15, 23, 42, 0.60);
    --glass-2:     rgba(30, 41, 59, 0.70);
    --input-bg:    rgba(30, 41, 59, 0.50);
    --border-soft: rgba(255, 255, 255, 0.10);
    --border-hair: rgba(255, 255, 255, 0.08);
    --border-nav:  rgba(67, 70, 85, 0.30);
    --blue:        #2563EB;
    --blue-400:    #3B82F6;
    --blue-300:    #60A5FA;
    --user-bubble: rgba(37, 99, 235, 0.80);
    --user-border: rgba(59, 130, 246, 0.30);
    --pill-bg:     #242A3A;
    --text-hi:     #F8FAFC;
    --text-nav:    #DDE2F8;
    --text-nav-2:  #C3C6D7;
    --text-mut:    #94A3B8;
    --text-mut-2:  #64748B;
    --avatar-ring: #1E293B;
    font-synthesis: none;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', -apple-system, Roboto, Helvetica, sans-serif;
    color: var(--text-hi);
    background:
      radial-gradient(1200px 620px at 50% -8%, #16233f 0%, rgba(11,17,32,0) 62%),
      radial-gradient(900px 500px at 82% 8%, #1b2b4d 0%, rgba(11,17,32,0) 55%),
      linear-gradient(180deg, #0b1120 0%, #070b16 100%);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ------------------------------------------------------------------ APPBAR */
  .appbar {
    position: sticky;
    top: 0;
    z-index: 40;
    background: var(--bg-appbar);
    border-bottom: 1px solid var(--border-nav);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    padding: 0 clamp(20px, 3.5vw, 48px);
  }
  .appbar-inner {
    max-width: 1400px;
    margin: 0 auto;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 28px;
  }
  .brand { display: flex; align-items: center; gap: 16px; min-width: 0; }
  .brand-badge {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; flex-shrink: 0;
    border-radius: 9999px;
    background: var(--blue);
    box-shadow: 0 6px 18px -4px rgba(37, 99, 235, 0.55);
  }
  .brand-text { display: flex; flex-direction: column; min-width: 0; }
  .brand-title {
    font-family: 'Hanken Grotesk', 'Inter', sans-serif;
    font-weight: 700; font-size: 24px; line-height: 30px;
    color: var(--text-nav); white-space: nowrap;
  }
  .brand-sub {
    font-family: 'Geist', 'Inter', sans-serif;
    font-weight: 600; font-size: 12px; line-height: 16px;
    letter-spacing: 0.6px; color: var(--text-nav-2);
    text-transform: uppercase; white-space: nowrap;
  }

  .nav-actions { display: flex; align-items: center; gap: 18px; }
  .lang-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 16px;
    border-radius: 9999px;
    border: 1px solid var(--border-nav);
    background: var(--pill-bg);
    color: var(--text-nav);
    font-size: 15px;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .lang-pill:hover { background: #2b3245; border-color: rgba(96,165,250,.35); }
  .nav-divider {
    width: 1px; height: 26px; flex-shrink: 0;
    background: var(--border-nav);
  }
  .icon-group { display: flex; align-items: center; gap: 6px; }
  .icon-btn {
    display: flex; align-items: center; justify-content: center;
    width: 42px; height: 42px;
    border-radius: 9999px;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--border-hair); }
  .icon-btn svg { display: block; }

  /* --------------------------------------------------- STAGE (70/30 split) */
  .stage {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    overflow: hidden;
  }
  /* weather-sky background layer (placeholder for the presenter backdrop) */
  .stage-bg {
    position: absolute; inset: 0;
    opacity: 0.8;
    pointer-events: none;
    background:
      radial-gradient(80% 60% at 50% 6%, rgba(96,165,250,0.22) 0%, rgba(96,165,250,0) 60%),
      radial-gradient(60% 44% at 22% 24%, rgba(37,99,235,0.28) 0%, rgba(37,99,235,0) 65%),
      radial-gradient(55% 50% at 82% 30%, rgba(56,89,168,0.30) 0%, rgba(56,89,168,0) 62%),
      linear-gradient(180deg, #0f1b34 0%, #0b1428 46%, #070b16 100%);
  }
  .stage-bg::after {
    /* soft drifting cloud bands */
    content: "";
    position: absolute; inset: -10% -20%;
    background:
      radial-gradient(40% 30% at 20% 30%, rgba(148,163,184,0.10), transparent 70%),
      radial-gradient(46% 34% at 72% 22%, rgba(203,213,225,0.08), transparent 72%),
      radial-gradient(38% 30% at 48% 60%, rgba(96,165,250,0.10), transparent 70%);
    animation: drift 26s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translate3d(-2%, 0, 0) scale(1.02); }
    to   { transform: translate3d(3%, -1.5%, 0) scale(1.08); }
  }

  /* presenter -- left column, 70% width, full height */
  .presenter {
    position: relative;
    z-index: 1;
    flex: 0 0 70%;
    min-width: 0;
    overflow: hidden;
  }
  .presenter-frame {
    position: absolute; inset: 0;
    background: #0b1120;
    overflow: hidden;
  }
  .presenter-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;   /* keep the studio top; crop the bottom (blurred desk pad) */
    display: block;
  }
  .presenter-frame::after {
    /* subtle vignette so the name tag + right seam read cleanly */
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(7,11,22,0) 72%, rgba(7,11,22,0.55) 100%),
      linear-gradient(90deg, rgba(7,11,22,0) 88%, rgba(7,11,22,0.45) 100%);
  }

  /* loading / connect overlay -- shown until the live avatar is streaming */
  .avatar-overlay {
    position: absolute; inset: 0; z-index: 3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; text-align: center; padding: 24px;
    background:
      radial-gradient(70% 55% at 50% 34%, rgba(37,99,235,0.20), transparent 66%),
      linear-gradient(180deg, #0f1b34 0%, #0b1428 52%, #070b16 100%);
    transition: opacity .5s ease, visibility .5s ease;
  }
  .avatar-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader {
    width: 64px; height: 64px; border-radius: 50%;
    border: 3px solid rgba(96,165,250,0.18);
    border-top-color: #60A5FA;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-title {
    font-family: 'Hanken Grotesk','Inter',sans-serif;
    font-weight: 700; font-size: 22px; color: var(--text-nav); letter-spacing: .3px;
  }
  .overlay-sub { font-size: 13px; color: var(--text-mut); letter-spacing: .2px; margin-top: -12px; }
  .connect-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 28px; margin-top: 4px;
    border-radius: 9999px; border: 1px solid rgba(96,165,250,0.45);
    background: var(--blue); color: #fff;
    font-family: inherit; font-size: 15px; font-weight: 600; letter-spacing: .2px;
    cursor: pointer;
    box-shadow: 0 10px 24px -6px rgba(37,99,235,0.6);
    transition: transform .12s ease, filter .12s ease, opacity .2s ease;
  }
  .connect-btn:hover { filter: brightness(1.08); }
  .connect-btn:active { transform: scale(0.96); }
  .avatar-overlay[data-mode="connecting"] .connect-btn { display: none; }
  .avatar-overlay[data-mode="idle"] .loader { animation-duration: 2.4s; opacity: .75; }

  /* name tag pill -- floats over the bottom of the presenter panel */
  .name-tag {
    position: absolute; z-index: 4;
    left: 50%; bottom: 24px; transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 12px;
    padding: 8px 16px;
    border-radius: 9999px;
    border: 1px solid var(--border-hair);
    background: var(--glass);
    box-shadow: 0 4px 30px 0 rgba(0,0,0,0.50);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
  }
  .eq { display: flex; align-items: flex-end; gap: 4px; height: 16px; }
  .eq span {
    width: 4px; border-radius: 9999px; background: var(--blue-400);
    animation: eq 1.05s ease-in-out infinite;
  }
  .eq span:nth-child(1) { height: 12px; background: var(--blue-400); animation-delay: 0s; }
  .eq span:nth-child(2) { height: 16px; background: var(--blue-300); animation-delay: .18s; }
  .eq span:nth-child(3) { height: 8px;  background: var(--blue-400); animation-delay: .36s; }
  @keyframes eq { 0%,100% { transform: scaleY(.55); } 50% { transform: scaleY(1); } }
  .name-tag-label { font-size: 14px; font-weight: 500; letter-spacing: 0.35px; color: var(--text-hi); white-space: nowrap; }
  .status-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.14); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #64748B; flex-shrink: 0;
    box-shadow: 0 0 0 0 rgba(96,165,250,0);
  }
  .status-label { font-size: 12px; font-weight: 500; letter-spacing: 0.2px; color: var(--text-mut); white-space: nowrap; }
  .disconnect-btn {
    display: none; align-items: center; gap: 5px;
    margin-left: 4px; padding: 4px 10px 4px 8px;
    border-radius: 9999px; border: 1px solid rgba(248,113,113,0.35);
    background: rgba(248,113,113,0.12); color: #fca5a5;
    font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: .2px;
    cursor: pointer; transition: background .15s ease, border-color .15s ease, color .15s ease;
  }
  .disconnect-btn:hover { background: rgba(248,113,113,0.22); border-color: rgba(248,113,113,0.55); color: #fecaca; }
  .disconnect-btn svg { display: block; }
  /* only offer disconnect once a session is live */
  #nameTag[data-state="live"] .disconnect-btn,
  #nameTag[data-state="speaking"] .disconnect-btn { display: inline-flex; }
  #nameTag[data-state="connecting"] .status-dot { background: #f59e0b; animation: pulse 1s ease-in-out infinite; }
  #nameTag[data-state="live"] .status-dot,
  #nameTag[data-state="speaking"] .status-dot { background: #22c55e; animation: pulse 1.6s ease-in-out infinite; }
  #nameTag[data-state="speaking"] .status-dot { background: #60A5FA; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(96,165,250,.5);} 50% { box-shadow: 0 0 0 6px rgba(96,165,250,0);} }
  /* equalizer only animates while the bot is actually speaking */
  .eq span { animation-play-state: paused; }
  #nameTag[data-state="speaking"] .eq span { animation-play-state: running; }
  /* mic/connect button states */
  .round-btn.active { border-color: rgba(96,165,250,.6); color: #60A5FA; background: rgba(37,99,235,0.18); }
  .round-btn.connecting { border-color: rgba(245,158,11,.6); color: #f59e0b; }
  /* Muted: mic click toggles this -- red tint + a diagonal slash across the mic icon. */
  .round-btn.muted { border-color: rgba(239,68,68,.6); color: #ef4444; background: rgba(239,68,68,0.12); position: relative; }
  .round-btn.muted::after {
    content: ''; position: absolute; left: 9px; right: 9px; top: 50%; height: 2px;
    background: #ef4444; border-radius: 2px; transform: translateY(-1px) rotate(-45deg);
    box-shadow: 0 -3px 0 -1px var(--glass);
  }

  /* --------------------------------------------- CHAT CONSOLE (right, 30%) */
  .console {
    position: relative;
    z-index: 3;
    flex: 0 0 30%;
    min-width: 320px;
    height: 100%;
    padding: 22px 22px 14px;
    border-left: 1px solid var(--border-soft);
    background: var(--glass);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
  }

  .messages {
    display: flex;
    flex-direction: column;
    gap: 15px;
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding-right: 4px;
    padding-bottom: 6px;
  }
  .messages::-webkit-scrollbar { width: 8px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(148,163,184,.25); border-radius: 8px; }

  .msg { display: flex; gap: 12px; max-width: 92%; }
  .msg.ai { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; max-width: 88%; }

  .avatar-dot {
    width: 40px; height: 40px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 9999px;
    border: 1px solid var(--border-soft);
    background: var(--avatar-ring);
    margin-top: 4px;
  }
  .bubble-wrap { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .bubble {
    padding: 14px 16px;
    font-size: 14px; line-height: 22.75px;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
  }
  .msg.ai .bubble {
    border-radius: 0 16px 16px 16px;
    border: 1px solid rgba(255,255,255,0.05);
    background: var(--glass-2);
    color: var(--text-hi);
  }
  .msg.user .bubble {
    border-radius: 16px 0 16px 16px;
    border: 1px solid var(--user-border);
    background: var(--user-bubble);
    box-shadow: 0 4px 15px 0 rgba(37,99,235,0.30);
    color: #fff;
  }
  /* Live STT bubble: the in-progress utterance while the user is still speaking. */
  .msg.user.live .bubble { opacity: 0.82; }
  .msg.user.live .caret {
    display: inline-block; width: 2px; height: 14px; margin-left: 3px;
    vertical-align: -2px; background: #fff; border-radius: 1px;
    animation: caretPulse 1s steps(1) infinite;
  }
  @keyframes caretPulse { 50% { opacity: 0; } }
  .meta {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; line-height: 15px; color: var(--text-mut-2);
  }
  .msg.ai .meta { padding-left: 4px; }
  .msg.user .meta { padding-right: 4px; justify-content: flex-end; }

  /* input area */
  .input-area {
    display: flex; align-items: center; gap: 12px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border-soft);
  }
  .round-btn {
    display: flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; flex-shrink: 0;
    border-radius: 9999px;
    border: 1px solid var(--border-hair);
    background: var(--glass);
    box-shadow: 0 4px 30px 0 rgba(0,0,0,0.50);
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    color: #CBD5E1;
    cursor: pointer;
    transition: border-color .15s ease, color .15s ease;
  }
  .round-btn:hover { border-color: rgba(96,165,250,.4); color: #e2e8f0; }

  .input-shell {
    position: relative;
    flex: 1 1 auto;
    display: flex; align-items: center;
    padding: 13px 96px 14px 20px;
    border-radius: 9999px;
    border: 1px solid var(--border-soft);
    background: var(--input-bg);
    min-width: 0;
  }
  .input-shell input {
    flex: 1 1 auto; min-width: 0;
    border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 14px; color: var(--text-hi);
  }
  .input-shell input::placeholder { color: var(--text-mut); }

  .voice-wave {
    position: absolute; right: 56px; top: 50%; transform: translateY(-50%);
    display: flex; align-items: center; gap: 2px; height: 24px; opacity: 0.6;
  }
  .voice-wave span {
    width: 4px; border-radius: 9999px; background: var(--blue-300);
    animation: wave 1.1s ease-in-out infinite;
  }
  .voice-wave span:nth-child(1){ height:12px; animation-delay:0s; }
  .voice-wave span:nth-child(2){ height:20px; animation-delay:.12s; }
  .voice-wave span:nth-child(3){ height:8px;  animation-delay:.24s; }
  .voice-wave span:nth-child(4){ height:24px; animation-delay:.36s; }
  .voice-wave span:nth-child(5){ height:16px; animation-delay:.48s; }
  @keyframes wave { 0%,100% { transform: scaleY(.5);} 50% { transform: scaleY(1);} }

  .send-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px;
    border-radius: 9999px; border: none;
    background: var(--blue);
    box-shadow: 0 10px 15px -3px rgba(59,130,246,0.30), 0 4px 6px -4px rgba(59,130,246,0.30);
    cursor: pointer;
    transition: transform .12s ease, filter .12s ease;
  }
  .send-btn:hover { filter: brightness(1.08); }
  .send-btn:active { transform: translateY(-50%) scale(0.94); }

  /* --------------------------------------------------------------- RESPONSIVE */
  /* Tablet / narrow desktop: give the chat a touch more room */
  @media (max-width: 1100px) and (min-width: 861px) {
    .presenter { flex-basis: 62%; }
    .console { flex-basis: 38%; }
  }

  /* Phones / small tablets: stack vertically, presenter becomes a top banner */
  @media (max-width: 860px) {
    body { height: auto; min-height: 100dvh; overflow-y: auto; overflow-x: hidden; }
    .stage { flex-direction: column; align-items: stretch; overflow: visible; }
    .presenter {
      flex: 0 0 auto;
      width: 100%;
      aspect-ratio: 1537 / 620;   /* top-anchored banner crop */
    }
    .presenter-img { object-position: center top; }
    .name-tag { bottom: 16px; }
    .console {
      flex: 0 0 auto;
      width: 100%;
      min-width: 0;
      height: auto;
      border-left: none;
      border-top: 1px solid var(--border-soft);
      padding: 18px 16px 14px;
    }
    .messages { flex: 0 0 auto; max-height: none; overflow: visible; }
    .msg, .msg.user { max-width: 88%; }
  }
  @media (max-width: 720px) {
    .appbar { padding: 0 14px; }
    .appbar-inner { height: 62px; gap: 12px; }
    .brand-sub { display: none; }
    .brand-title { font-size: 20px; line-height: 24px; }
    .lang-pill .lang-label { display: none; }
    .lang-pill { padding: 8px 11px; }
    .nav-actions { gap: 10px; }
    .nav-divider { display: none; }
    .icon-group { gap: 2px; }
    .icon-btn { width: 38px; height: 38px; }
    .input-shell { padding: 12px 92px 12px 16px; }
  }
  @media (max-width: 420px) {
    .msg .avatar-dot { display: none; }
    .voice-wave { display: none; }
    .input-shell { padding: 12px 48px 12px 16px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .eq span, .voice-wave span, .stage-bg::after, .presenter-frame::before { animation: none !important; }
  }
</style>
</head>
<body>

  <!-- ===================================================== TOP NAVIGATION -->
  <header class="appbar">
   <div class="appbar-inner">
    <div class="brand">
      <div class="brand-badge" aria-hidden="true">
        <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5.5 16C3.98333 16 2.6875 15.475 1.6125 14.425C0.5375 13.375 0 12.0917 0 10.575C0 9.275 0.391667 8.11667 1.175 7.1C1.95833 6.08333 2.98333 5.43333 4.25 5.15C4.66667 3.61667 5.5 2.375 6.75 1.425C8 0.475 9.41667 0 11 0C12.95 0 14.6042 0.679167 15.9625 2.0375C17.3208 3.39583 18 5.05 18 7C19.15 7.13333 20.1042 7.62917 20.8625 8.4875C21.6208 9.34583 22 10.35 22 11.5C22 12.75 21.5625 13.8125 20.6875 14.6875C19.8125 15.5625 18.75 16 17.5 16H5.5ZM5.5 14H17.5C18.2 14 18.7917 13.7583 19.275 13.275C19.7583 12.7917 20 12.2 20 11.5C20 10.8 19.7583 10.2083 19.275 9.725C18.7917 9.24167 18.2 9 17.5 9H16V7C16 5.61667 15.5125 4.4375 14.5375 3.4625C13.5625 2.4875 12.3833 2 11 2C9.61667 2 8.4375 2.4875 7.4625 3.4625C6.4875 4.4375 6 5.61667 6 7H5.5C4.53333 7 3.70833 7.34167 3.025 8.025C2.34167 8.70833 2 9.53333 2 10.5C2 11.4667 2.34167 12.2917 3.025 12.975C3.70833 13.6583 4.53333 14 5.5 14Z" fill="#EEEFFF"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-title">Nimbus AI</span>
        <span class="brand-sub">AI Meteorological System</span>
      </div>
    </div>

    <nav class="nav-actions">

  <script>
  (() => {
    "use strict";
    const micBtn   = document.getElementById('micBtn');
    const avatar   = document.getElementById('avatar');
    const botAudio = document.getElementById('botAudio');
    const nameTag  = document.getElementById('nameTag');
    const statusLabel = document.getElementById('statusLabel');
    const messages = document.getElementById('messages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn  = document.getElementById('sendBtn');
    const overlay  = document.getElementById('avatarOverlay');
    const overlaySub = document.getElementById('overlaySub');
    const connectBtn = document.getElementById('connectBtn');

    function setOverlay(mode) {
      if (mode === 'live') { overlay.classList.add('hidden'); return; }
      overlay.classList.remove('hidden');
      overlay.dataset.mode = mode;
      overlaySub.textContent = mode === 'connecting' ? 'Connecting to Nimbus...' : 'Weather presenter ready';
    }

    const fmt = (d) => {
      let h = d.getHours(), m = d.getMinutes(), ap = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ap}`;
    };
    const clockEl = document.querySelector('[data-clock]');
    if (clockEl) clockEl.textContent = fmt(new Date());

    function setState(state, label) {
      nameTag.dataset.state = state;
      statusLabel.textContent = label;
    }
    function addSystem(text) {
      const el = document.createElement('div');
      el.style.cssText = 'align-self:center;font-size:11px;color:var(--text-mut-2);padding:2px 0;letter-spacing:.2px;';
      el.textContent = text;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    }
    const TICK = '<svg width="9" height="9" viewBox="0 0 9 9" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.69922 1.07422C6.81641 0.94401 6.875 0.794271 6.875 0.625C6.875 0.455729 6.81641 0.30599 6.69922 0.175781C6.56901 0.0585938 6.41927 0 6.25 0C6.08073 0 5.93099 0.0585938 5.80078 0.175781L3.125 2.87109L2.01172 1.73828C1.88151 1.62109 1.73177 1.5625 1.5625 1.5625C1.39323 1.5625 1.24349 1.62109 1.11328 1.73828C0.996094 1.86849 0.9375 2.01823 0.9375 2.1875C0.9375 2.35677 0.996094 2.50651 1.11328 2.63672L2.67578 4.19922C2.80599 4.31641 2.95573 4.375 3.125 4.375C3.29427 4.375 3.44401 4.31641 3.57422 4.19922L6.69922 1.07422ZM8.57422 3.57422C8.69141 3.44401 8.75 3.29427 8.75 3.125C8.75 2.95573 8.69141 2.80599 8.57422 2.67578C8.44401 2.55859 8.29427 2.5 8.125 2.5C7.95573 2.5 7.80599 2.55859 7.67578 2.67578L3.125 7.24609L1.07422 5.17578C0.94401 5.05859 0.794271 5 0.625 5C0.455729 5 0.30599 5.05859 0.175781 5.17578C0.0585938 5.30599 0 5.45573 0 5.625C0 5.79427 0.0585938 5.94401 0.175781 6.07422L2.67578 8.57422C2.80599 8.69141 2.95573 8.75 3.125 8.75C3.29427 8.75 3.44401 8.69141 3.57422 8.57422L8.57422 3.57422Z" fill="#3B82F6"/></svg>';
    function addUserMessage(text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg user';
      const b = document.createElement('div'); b.className = 'bubble-wrap';
      const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
      const meta = document.createElement('div'); meta.className = 'meta';
      meta.innerHTML = fmt(new Date()) + ' ' + TICK;
      b.appendChild(bub); b.appendChild(meta); wrap.appendChild(b);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
    }
    const CLOUD = '<svg width="18" height="13" viewBox="0 0 18 13" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0 8.3125C0.0364583 9.42448 0.419271 10.3542 1.14844 11.1016C1.89583 11.8307 2.82552 12.2135 3.9375 12.25H14C14.9844 12.2318 15.8138 11.8945 16.4883 11.2383C17.1445 10.5638 17.4818 9.73438 17.5 8.75C17.4818 7.89323 17.2174 7.15495 16.707 6.53516C16.1784 5.89714 15.513 5.49609 14.7109 5.33203C14.8203 5.02214 14.875 4.70312 14.875 4.375C14.8568 3.6276 14.6016 3.00781 14.1094 2.51562C13.6172 2.02344 12.9974 1.76823 12.25 1.75C11.7031 1.75 11.2201 1.89583 10.8008 2.1875C10.3997 1.53125 9.87109 1.0026 9.21484 0.601562C8.55859 0.21875 7.82031 0.0182292 7 0C5.76042 0.0364583 4.73047 0.464844 3.91016 1.28516C3.08984 2.10547 2.66146 3.13542 2.625 4.375C2.625 4.44792 2.625 4.52083 2.625 4.59375C1.84115 4.88542 1.21224 5.35938 0.738281 6.01562C0.264323 6.67188 0.0182292 7.4375 0 8.3125Z" fill="#60A5FA"/></svg>';
    function addBotMessage(text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ai';
      const dot = document.createElement('div'); dot.className = 'avatar-dot'; dot.setAttribute('aria-hidden','true'); dot.innerHTML = CLOUD;
      const b = document.createElement('div'); b.className = 'bubble-wrap';
      const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
      const meta = document.createElement('div'); meta.className = 'meta'; meta.textContent = fmt(new Date());
      b.appendChild(bub); b.appendChild(meta);
      wrap.appendChild(dot); wrap.appendChild(b);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
    }

    let pc = null, micStream = null, connected = false, connecting = false, muted = false;

    // Toggle the mic on/off by enabling/disabling the outgoing audio track (stays connected;
    // Disconnect is the separate button). A disabled track sends silence, so STT hears nothing.
    function setMuted(on) {
      muted = on;
      if (micStream) micStream.getAudioTracks().forEach(t => { t.enabled = !on; });
      micBtn.classList.toggle('muted', on);
      micBtn.setAttribute('aria-label', on ? 'Unmute microphone' : 'Mute microphone');
      micBtn.title = on ? 'Unmute' : 'Mute';
      if (connected && !speaking) setState('live', on ? 'Muted' : 'Listening');
    }
    let audioCtx = null, rafId = 0, speaking = false, pendingText = null;
    let transcriptSeq = 0, pollTimer = 0;

    // Live STT bubble: one ephemeral user bubble that grows with the interim transcription
    // while the user is still speaking, then is swapped for the committed final bubble.
    let liveBubbleEl = null, livePartialText = '', livePartialStamp = 0;
    function ensureLiveBubble() {
      if (liveBubbleEl) return liveBubbleEl;
      const wrap = document.createElement('div');
      wrap.className = 'msg user live';
      const b = document.createElement('div'); b.className = 'bubble-wrap';
      const bub = document.createElement('div'); bub.className = 'bubble';
      const txt = document.createElement('span'); txt.className = 'live-text';
      const caret = document.createElement('span'); caret.className = 'caret';
      bub.appendChild(txt); bub.appendChild(caret);
      b.appendChild(bub); wrap.appendChild(b);
      messages.appendChild(wrap);
      liveBubbleEl = wrap;
      return wrap;
    }
    function removeLiveBubble() {
      if (liveBubbleEl) { liveBubbleEl.remove(); liveBubbleEl = null; }
      livePartialText = ''; livePartialStamp = 0;
    }
    function updateLivePartial(p) {
      const text = p && p.text ? p.text : '';
      if (!text) { removeLiveBubble(); return; }
      const wrap = ensureLiveBubble();
      if (text !== livePartialText) {
        wrap.querySelector('.live-text').textContent = text;
        livePartialText = text;
        livePartialStamp = performance.now();
        messages.scrollTop = messages.scrollHeight;
      } else if (livePartialStamp && performance.now() - livePartialStamp > 2000) {
        // Trailed off: no finalized frame and no new interim for 2s -> stop showing the stale partial.
        removeLiveBubble();
      }
    }

    // Poll the server transcript for new lines (bot replies + finalized user speech) -> bubbles,
    // plus the in-progress user utterance (STT interim) -> the live bubble.
    async function pollTranscript() {
      try {
        const r = await fetch('/client/transcript?since=' + transcriptSeq);
        if (r.ok) {
          const data = await r.json();
          let committedUser = false;
          for (const it of (data.items || [])) {
            transcriptSeq = it.seq;
            if (it.role === 'bot') addBotMessage(it.text);
            else if (it.role === 'user') { removeLiveBubble(); addUserMessage(it.text); committedUser = true; }  // voice turns (typed are echoed already)
          }
          updateLivePartial(committedUser ? null : data.partial);
        }
      } catch (_) { /* transient; keep polling */ }
    }
    function startPolling() { if (!pollTimer) pollTimer = setInterval(pollTranscript, 200); }
    function stopPolling()  { if (pollTimer) { clearInterval(pollTimer); pollTimer = 0; } }

    function iceComplete(pc) {
      return new Promise((res) => {
        if (pc.iceGatheringState === 'complete') return res();
        const chk = () => {
          if (pc.iceGatheringState === 'complete') {
            pc.removeEventListener('icegatheringstatechange', chk); res();
          }
        };
        pc.addEventListener('icegatheringstatechange', chk);
        setTimeout(res, 3500); // fall back to whatever we have (host candidates)
      });
    }

    // Watch the bot audio energy -> flip Listening <-> Speaking (drives the equalizer).
    function watchBotAudio(stream) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaStreamSource(stream);
        const an = audioCtx.createAnalyser();
        an.fftSize = 512; src.connect(an);
        const buf = new Uint8Array(an.frequencyBinCount);
        let hi = 0, lo = 0;
        const tick = () => {
          an.getByteTimeDomainData(buf);
          let sum = 0;
          for (let i = 0; i < buf.length; i++) { const v = (buf[i]-128)/128; sum += v*v; }
          const rms = Math.sqrt(sum / buf.length);
          if (rms > 0.02) { hi++; lo = 0; } else { lo++; hi = 0; }
          if (!speaking && hi > 2) { speaking = true; setState('speaking','Speaking'); }
          else if (speaking && lo > 12) { speaking = false; if (connected) setState('live', muted ? 'Muted' : 'Listening'); }
          rafId = requestAnimationFrame(tick);
        };
        rafId = requestAnimationFrame(tick);
      } catch (e) { console.warn('[nimbus] analyser failed', e); }
    }

    async function connect() {
      if (connecting || connected) return;
      connecting = true;
      transcriptSeq = 0;   // each session's server store restarts at seq 1
      removeLiveBubble();
      setMuted(false);     // start each session with the mic live
      micBtn.classList.add('connecting');
      setState('connecting', 'Connecting...');
      setOverlay('connecting');
      try {
        pc = new RTCPeerConnection();
        pc.ontrack = (e) => {
          const stream = e.streams[0] || new MediaStream([e.track]);
          if (e.track.kind === 'video') {
            avatar.srcObject = stream; avatar.play().catch(()=>{});
          } else if (e.track.kind === 'audio') {
            botAudio.srcObject = stream; botAudio.play().catch(()=>{});
            watchBotAudio(stream);
          }
        };
        pc.onconnectionstatechange = () => {
          const s = pc.connectionState;
          if (s === 'connected') {
            connected = true; connecting = false;
            micBtn.classList.remove('connecting'); micBtn.classList.add('active');
            setState('live', 'Listening');
            setOverlay('live');
            addSystem('Connected - speak or type to Nimbus');
            startPolling();
            if (pendingText) { const t = pendingText; pendingText = null; postSay(t); }
          } else if (s === 'disconnected' || s === 'failed' || s === 'closed') {
            teardown();
          }
        };

        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micStream.getTracks().forEach(t => pc.addTrack(t, micStream));
        pc.addTransceiver('video', { direction: 'recvonly' });

        await pc.setLocalDescription(await pc.createOffer());
        await iceComplete(pc);
        const resp = await fetch('/api/offer', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type })
        });
        if (!resp.ok) throw new Error('offer HTTP ' + resp.status);
        await pc.setRemoteDescription(await resp.json());
      } catch (e) {
        console.error('[nimbus] connect failed', e);
        addSystem('Could not connect: ' + (e && e.message || e));
        teardown();
      }
    }

    function teardown() {
      connected = false; connecting = false; speaking = false;
      micBtn.classList.remove('active', 'connecting');
      setState('', 'Offline');
      setOverlay('idle');
      stopPolling();
      removeLiveBubble();
      muted = false; micBtn.classList.remove('muted');
      micBtn.setAttribute('aria-label', 'Connect and talk'); micBtn.title = '';
      if (rafId) cancelAnimationFrame(rafId), rafId = 0;
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      if (pc) { try { pc.close(); } catch(_){} pc = null; }
      avatar.srcObject = null; botAudio.srcObject = null;
    }

    // POST a typed message to the live pipeline (LLM -> TTS -> avatar speaks it).
    async function postSay(text) {
      try {
        const r = await fetch('/client/say', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!r.ok && r.status !== 204) addSystem('Send failed (' + r.status + ')');
      } catch (e) { addSystem('Send failed: ' + (e && e.message || e)); }
    }
    function sendText() {
      const text = chatInput.value.trim();
      if (!text) return;
      addUserMessage(text);
      chatInput.value = '';
      if (connected) postSay(text);
      else { pendingText = text; connect(); }   // auto-connect, then flush
    }

    // Mic button: connect when offline; once connected, toggle mute (Disconnect is its own button).
    micBtn.addEventListener('click', () => {
      if (connecting) return;
      if (connected) setMuted(!muted);
      else connect();
    });
    connectBtn.addEventListener('click', connect);
    document.getElementById('disconnectBtn').addEventListener('click', teardown);
    sendBtn.addEventListener('click', sendText);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); sendText(); }
    });
  })();
  </script>
</body>
